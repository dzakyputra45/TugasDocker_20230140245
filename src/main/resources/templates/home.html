<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Home - Data Mahasiswa</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f7f9; margin: 20px; color: #333; }
        h2 { margin-bottom: 5px; font-size: 1.4rem; }
        p { font-size: 0.95rem; margin-bottom: 15px; }
        .add-link { display: inline-block; color: #007bff; text-decoration: none; font-weight: bold; margin-bottom: 20px; font-size: 0.9rem; }
        table { width: 100%; border-collapse: collapse; background: white; }
        th { background-color: #007bff; color: white; padding: 12px; border: 1px solid #ddd; }
        td { padding: 10px; text-align: center; border: 1px solid #ddd; font-size: 0.9rem; }
        .empty-row { background-color: #f9f9f9; font-style: italic; color: #666; }
        .logout { display: block; margin-top: 20px; color: #007bff; text-decoration: none; font-size: 0.9rem; }
    </style>
</head>
<body>

<h2>MY Website 20230140245</h2>
<p>Selamat datang di aplikasi!</p>

<a th:href="@{/form}" class="add-link">+ Input Data Mahasiswa</a>

<h3>Data Mahasiswa</h3>

<table>
    <thead>
    <tr>
        <th style="width: 10%;">No</th>
        <th style="width: 30%;">Nama</th>
        <th style="width: 30%;">NIM</th>
        <th style="width: 30%;">Jenis Kelamin</th>
    </tr>
    </thead>
    <tbody>
    <tr th:if="${#lists.isEmpty(listMhs)}" class="empty-row">
        <td colspan="4">Belum ada data</td>
    </tr>
    <tr th:each="mhs, iter : ${listMhs}">
        <td th:text="${iter.count}">1</td>
        <td th:text="${mhs.nama}">Nama</td>
        <td th:text="${mhs.nim}">NIM</td>
        <td th:text="${mhs.gender}">Jenis Kelamin</td>
    </tr>
    </tbody>
</table>

<a th:href="@{/}" class="logout">Logout</a>

</body>
</html>
